<!-- Admin Login 登录面板 -->
<div id="loginBox" class="max-w-md mx-auto mt-24">
  <h2 class="text-2xl font-bold text-center mb-8">设计师作品后台登录</h2>
  <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg">
    <div class="mb-5">
      <label class="block mb-2 font-medium">用户名</label>
      <input type="text" id="username" class="w-full border dark:border-gray-600 bg-transparent p-3 rounded-lg" placeholder="admin">
    </div>
    <div class="mb-8">
      <label class="block mb-2 font-medium">登录密码</label>
      <input type="password" id="pwd" class="w-full border dark:border-gray-600 bg-transparent p-3 rounded-lg" placeholder="123456">
    </div>
    <button onclick="login()" class="w-full py-3 bg-accent text-white rounded-lg font-medium">登录管理后台</button>
  </div>
</div>

<!-- Admin Panel 后台主面板 -->
<div id="adminPanel" class="hidden max-w-6xl mx-auto">
  <div class="flex justify-between items-center mb-10 flex-wrap gap-4">
    <h1 class="text-3xl font-bold">作品上传与管理系统</h1>
    <div class="flex gap-4">
      <a href="index.html" class="px-4 py-2 border rounded-lg">返回前台首页</a>
      <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg">退出登录</button>
    </div>
  </div>

  <!-- Work Add Form 新增/编辑表单 -->
  <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow mb-12">
    <h3 class="text-xl font-bold mb-6">新增 / 编辑设计作品</h3>
    <input type="hidden" id="editId">
    <div class="grid md:grid-cols-2 gap-6 mb-6">
      <div>
        <label class="block mb-2">作品标题（必填）</label>
        <input type="text" id="title" class="w-full border dark:border-gray-600 bg-transparent p-3 rounded-lg">
      </div>
      <div>
        <label class="block mb-2">作品分类（UI设计/品牌LOGO/平面海报/包装设计）</label>
        <input type="text" id="category" class="w-full border dark:border-gray-600 bg-transparent p-3 rounded-lg">
      </div>
    </div>
    <div class="mb-6">
      <label class="block mb-2">项目简介、设计思路、项目背景描述</label>
      <textarea id="desc" class="w-full border dark:border-gray-600 bg-transparent p-3 rounded-lg h-32"></textarea>
    </div>
    <div class="mb-6">
      <label class="block mb-2">封面主图（必填）</label>
      <input type="file" id="coverFile" accept="image/*" class="w-full">
      <div id="coverPreview" class="mt-4"></div>
    </div>
    <div class="mb-8">
      <label class="block mb-2">详情多图（可多选，项目细节效果图）</label>
      <input type="file" id="detailFiles" accept="image/*" multiple class="w-full">
      <div id="detailPreview" class="flex flex-wrap gap-3 mt-4"></div>
    </div>
